{{ define "topbar" }}
<head>
    <link rel="icon" type="image/png" href="/static/favicon.ico">
</head>
<nav class="navbar">
    <div class="container">
        <a href="/" class="navBrand" style="text-decoration: none; display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <img src="/static/logo.png" alt="Qube Logo" width="28" height="28">
            <span>QubeCloud</span>
        </a>
        <button class="navToggle" id="navToggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="navMenu">
            <a href="/" class="navLink">Home</a>
            <a href="/explore" class="navLink">Explore</a>
            <a href="/reports" id="navReportsLink" class="navLink" style="display:none;">Reports <span id="reportsCount" class="badge" style="background:#dc2626; color:white; padding:2px 6px; border-radius:10px; font-size:12px; margin-left:4px;"></span></a>
            <div class="navAuth" id="navAuth">
                <a href="/login" class="navLink">Login</a>
                <a href="/signup" class="btnPrimary">Get Started</a>
            </div>
            <div class="navUser" id="navUser" style="display: none;">
                <button id="uploadBtn" class="btnPrimarySm">+ Upload</button>
                <div class="userProfileMenu">
                    <button id="profileMenuBtn" class="profileBtn">
                        <img id="navAvatar" src="/static/img/avatar-default.svg" alt="Avatar" width="24" height="24" style="border-radius:50%" onerror="this.src='/static/img/avatar-default.svg'" />
                    </button>
                    <div class="profileDropdown" id="profileDropdown">
                        <div class="profileInfo">
                            <p id="profileUsername" class="profileName">User</p>
                            <p id="profileEmail" class="profileEmail">user@example.com</p>
                        </div>
                        <hr>
                        <a href="/profile" class="dropdownItem">My Images</a>
                        <a href="/settings" class="dropdownItem">Settings</a>
                        <a href="/reports" id="navReportsDropdown" class="dropdownItem" style="display:none;">Reports</a>
                        <hr>
                        <a href="#" id="logoutBtn" class="dropdownItem danger">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>
<script>
(async function(){
    try {
        const token = localStorage.getItem('token');
        if (!token) return;
        const res = await fetch('/api/auth/profile', { headers: { Authorization: `Bearer ${token}` }});
        if (!res.ok) return;
        const u = await res.json();
        const avatar = document.getElementById('navAvatar');
        if (avatar && u.id) { avatar.src = `/static/avatars/${u.id}.png`; }
        const uname = document.getElementById('profileUsername');
        const uemail = document.getElementById('profileEmail');
        if (uname) uname.textContent = u.username || 'User';
        if (uemail) uemail.textContent = u.email || '';
        
        try {
            const reportRes = await fetch('/api/reports', { headers: { Authorization: `Bearer ${token}` }});
            if (reportRes.ok) {
                const reports = await reportRes.json();
                const reportsLink = document.getElementById('navReportsLink');
                const reportsDropdown = document.getElementById('navReportsDropdown');
                
                if (reportsLink) reportsLink.style.display = 'inline-block';
                if (reportsDropdown) reportsDropdown.style.display = 'block';
                
                const count = Object.keys(reports).length;
                const badge = document.getElementById('reportsCount');
                if (badge && count > 0) {
                    badge.textContent = count;
                    badge.style.display = 'inline-block';
                } else if (badge) {
                    badge.style.display = 'none';
                }
            }
        } catch {}
    } catch {}
})();
</script>
{{ end }}
