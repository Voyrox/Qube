apiVersion: v1
kind: Namespace
metadata:
  name: apps
---
apiVersion: v1
kind: Secret
metadata:
  name: go-profile-env
  namespace: apps
type: Opaque
stringData:
  PORT: "32000"
  API_BASE_URL: "https://api.ewenmacculloch.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-profile
  namespace: apps
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: go-profile
  template:
    metadata:
      labels:
        app: go-profile
    spec:
      imagePullSecrets:
        - name: regcred
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: go-profile
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: go-profile
      containers:
        - name: app
          image: registry.ewenmacculloch.com/portfolio:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: go-profile-env
          ports:
            - name: http
              containerPort: 32000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: go-profile
  namespace: apps
spec:
  type: NodePort
  selector:
    app: go-profile
  ports:
    - name: http
      port: 32000
      targetPort: http
      nodePort: 32000
